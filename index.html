<!DOCTYPE html>

    <title>わんこなでなで</title>
    <link rel="stylesheet" href="style.css">
</head>

    <div class="container">
        <h1>犬をなでる</h1>

    <audio id="bark1" src="犬の鳴き声1.mp3"></audio>
    <audio id="bark2" src="犬の鳴き声2.mp3"></audio>

    <script src="script.js"></script>
